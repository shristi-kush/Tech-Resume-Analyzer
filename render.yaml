# Optional: connect this repo in Render via Blueprint, or set PYTHON_VERSION manually.
services:
  - type: web
    name: tech-resume-analyzer
    runtime: python
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn wsgi:application -c gunicorn.conf.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.9.18"
      - key: GUNICORN_TIMEOUT
        value: "480"
      - key: OLLAMA_TIMEOUT
        value: "420"
